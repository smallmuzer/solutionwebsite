    <!-- Always start in light mode, clear any stale dark preference -->
    <script>
      document.documentElement.classList.remove('dark');
      try {
        var c = document.cookie.match(/(^| )ss_ui_prefs=([^;]+)/);
        if (c) {
          var p = JSON.parse(decodeURIComponent(c[2]));
          if (p && p.darkMode === true) {
            p.darkMode = false;
            document.cookie = 'ss_ui_prefs=' + encodeURIComponent(JSON.stringify(p)) + ';path=/;SameSite=Lax';
          }
        }
      } catch(e) {}
    </script>
